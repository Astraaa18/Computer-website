<!DOCTYPE html>
<html>
<head>
    <title>Computer</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url(frontpage.webp);
            background-size: cover;
            background-position: center;
            height: 100vh;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.6);
        }

        .navbar a {
            color: aqua;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: white;
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .hero h1 {
            font-size: 48px;
            color: aqua;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 20px;
            max-width: 600px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 20px;
            background: aqua;
            color: black;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
        }

    </style>
</head>

<body>

    <div class="navbar">
        <div><strong>Computer World</strong></div>
        <div>
            <a href="Home.html">Home</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="hero">
        <h1>Welcome to Computer World</h1>
        <p>Explore the power of technology, innovation, and the digital future.</p>
        <a href="Home.html" class="btn">Get Started</a>
    </div>

</body>
</html>
